name: PR Reviewer Slack Ping

on:
  workflow_call:
    secrets:
      SLACK_PR_PING_TOKEN:
        required: true

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve and DM
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_PR_PING_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          EVENT_PATH: ${{ github.event_path }}
        run: |
          set -euo pipefail

          # Cached map fetch (public)
          MAP=$(curl -sSf https://raw.githubusercontent.com/conniehealth/.github/main/slack-id-map.json || echo '{}')

          resolve_slack_id() {
            local login="$1"
            local email slack_id resp

            email=$(gh api "users/${login}" --jq '.email // empty' 2>/dev/null || echo "")

            if [ -n "$email" ]; then
              resp=$(curl -sS -H "Authorization: Bearer ${SLACK_TOKEN}" \
                "https://slack.com/api/users.lookupByEmail?email=$(printf %s "$email" | jq -sRr @uri)")
              if [ "$(echo "$resp" | jq -r '.ok')" = "true" ]; then
                echo "$resp" | jq -r '.user.id'
                return
              fi
            fi

            echo "$MAP" | jq -r --arg login "$login" '.[$login] // empty'
          }

          post_dm() {
            local slack_id="$1" text="$2"
            local payload
            payload=$(jq -n --arg ch "$slack_id" --arg text "$text" \
              '{channel:$ch, text:$text, unfurl_links:false}')
            curl -sS -X POST \
              -H "Authorization: Bearer ${SLACK_TOKEN}" \
              -H "Content-Type: application/json; charset=utf-8" \
              --data "$payload" \
              https://slack.com/api/chat.postMessage | jq -e '.ok' >/dev/null
          }

          truncate_body() {
            # First 280 chars, single-line, ellipsize if cut
            local body="$1"
            body=$(echo "$body" | tr '\n' ' ' | sed 's/  */ /g')
            if [ ${#body} -gt 280 ]; then
              body="${body:0:280}…"
            fi
            echo "$body"
          }

          ping_user() {
            local login="$1" text="$2"
            local slack_id
            slack_id=$(resolve_slack_id "$login")
            if [ -z "$slack_id" ]; then
              echo "::warning::No Slack ID for ${login}; skipping"
              return
            fi
            post_dm "$slack_id" "$text"
            echo "Pinged ${login} (${slack_id})"
          }

          case "$EVENT_NAME" in
            pull_request)
              # review_requested
              REVIEWER=$(jq -r '.requested_reviewer.login // empty' "$EVENT_PATH")
              PR_URL=$(jq -r '.pull_request.html_url' "$EVENT_PATH")
              PR_TITLE=$(jq -r '.pull_request.title' "$EVENT_PATH")
              PR_AUTHOR=$(jq -r '.pull_request.user.login' "$EVENT_PATH")
              PR_NUM=$(jq -r '.pull_request.number' "$EVENT_PATH")
              [ -z "$REVIEWER" ] && exit 0
              text=":eyes: *Review requested* on <${PR_URL}|${REPO}#${PR_NUM}>: ${PR_TITLE} — by @${PR_AUTHOR}"
              ping_user "$REVIEWER" "$text"
              ;;

            issue_comment|pull_request_review_comment|pull_request_review)
              # Skip issue_comment on plain issues (no .issue.pull_request)
              if [ "$EVENT_NAME" = "issue_comment" ]; then
                is_pr=$(jq -r '.issue.pull_request != null' "$EVENT_PATH")
                [ "$is_pr" != "true" ] && exit 0
              fi

              # Mention-based ping
              if [ "$EVENT_NAME" = "issue_comment" ]; then
                BODY=$(jq -r '.comment.body' "$EVENT_PATH")
                COMMENT_URL=$(jq -r '.comment.html_url' "$EVENT_PATH")
                COMMENTER=$(jq -r '.comment.user.login' "$EVENT_PATH")
                PR_URL=$(jq -r '.issue.html_url' "$EVENT_PATH")
                PR_TITLE=$(jq -r '.issue.title' "$EVENT_PATH")
                PR_NUM=$(jq -r '.issue.number' "$EVENT_PATH")
              elif [ "$EVENT_NAME" = "pull_request_review_comment" ]; then
                BODY=$(jq -r '.comment.body' "$EVENT_PATH")
                COMMENT_URL=$(jq -r '.comment.html_url' "$EVENT_PATH")
                COMMENTER=$(jq -r '.comment.user.login' "$EVENT_PATH")
                PR_URL=$(jq -r '.pull_request.html_url' "$EVENT_PATH")
                PR_TITLE=$(jq -r '.pull_request.title' "$EVENT_PATH")
                PR_NUM=$(jq -r '.pull_request.number' "$EVENT_PATH")
              else
                BODY=$(jq -r '.review.body' "$EVENT_PATH")
                COMMENT_URL=$(jq -r '.review.html_url' "$EVENT_PATH")
                COMMENTER=$(jq -r '.review.user.login' "$EVENT_PATH")
                PR_URL=$(jq -r '.pull_request.html_url' "$EVENT_PATH")
                PR_TITLE=$(jq -r '.pull_request.title' "$EVENT_PATH")
                PR_NUM=$(jq -r '.pull_request.number' "$EVENT_PATH")
              fi

              # Skip bot commenters
              case "$COMMENTER" in *\[bot\]) exit 0 ;; esac

              # Extract @mentions (login chars: alnum + dash, 1-39)
              mentions=$(echo "$BODY" | grep -oE '@[A-Za-z0-9][A-Za-z0-9-]{0,38}' | sed 's/^@//' | sort -u || true)
              [ -z "$mentions" ] && exit 0

              excerpt=$(truncate_body "$BODY")

              while IFS= read -r login; do
                [ -z "$login" ] && continue
                text=":speech_balloon: *Mentioned by @${COMMENTER}* on <${PR_URL}|${REPO}#${PR_NUM}>: ${PR_TITLE}
> ${excerpt}
<${COMMENT_URL}|Jump to comment>"
                ping_user "$login" "$text"
              done <<< "$mentions"
              ;;
          esac
